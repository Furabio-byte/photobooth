<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photobooth 3D</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --page-bg: #ffffff;
      --panel-border: #e8e8e8;
      --text-color: #111111;
      --muted-text: #666666;
      --shadow-color: rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: var(--page-bg);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text-color);
    }

    main {
      width: min(100%, 1200px);
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      font-weight: 600;
      letter-spacing: 0.02em;
      text-align: center;
    }

    p {
      margin: 0 0 10px;
      text-align: center;
      font-size: 0.95rem;
      color: var(--muted-text);
    }

    model-viewer {
      width: 100%;
      height: min(78vh, 760px);
      background: #ffffff;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      model-viewer {
        height: 68vh;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Photobooth 3D</h1>
    <p>Esplora il modello con zoom, rotazione automatica e controlli touch.</p>
    <model-viewer
      src="./assets/models/test.glb"
      alt="Modello 3D Photobooth"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1.2">
    </model-viewer>
  </main>
</body>
</html>
