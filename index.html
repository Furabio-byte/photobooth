<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photobooth 3D</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --page-bg: linear-gradient(135deg, #f8f3eb 0%, #ebe1d4 100%);
      --panel-bg: rgba(255, 252, 247, 0.84);
      --panel-border: rgba(108, 85, 58, 0.14);
      --text-color: #4b3725;
      --shadow-color: rgba(76, 56, 33, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--page-bg);
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text-color);
    }

    main {
      width: min(100%, 960px);
      padding: 20px;
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background: var(--panel-bg);
      box-shadow: 0 24px 60px var(--shadow-color);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 3vw, 2.8rem);
      letter-spacing: 0.03em;
      text-align: center;
    }

    p {
      margin: 0 0 20px;
      text-align: center;
      font-size: 1rem;
    }

    model-viewer {
      width: 100%;
      height: min(70vh, 640px);
      border-radius: 20px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.95), rgba(239, 229, 214, 0.72)),
        #f4ece2;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      main {
        padding: 14px;
        border-radius: 22px;
      }

      model-viewer {
        height: 58vh;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Photobooth 3D</h1>
    <p>Esplora il modello con zoom, rotazione automatica e controlli touch.</p>
    <model-viewer
      src="./assets/models/test.glb"
      alt="Modello 3D Photobooth"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1.2">
    </model-viewer>
  </main>
</body>
</html>
