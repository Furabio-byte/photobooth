<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photobooth 3D</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --page-bg: #ffffff;
      --muted-text: #6b6b6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page-bg);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    main {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: #ffffff;
      touch-action: pan-y;
      user-select: none;
    }

    .counter,
    .hint {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted-text);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 1;
    }

    .counter {
      top: 22px;
      font-size: 0.82rem;
    }

    .hint {
      bottom: 26px;
      font-size: 0.78rem;
    }

    @media (max-width: 720px) {
      .counter,
      .hint {
        font-size: 0.7rem;
      }

      .counter {
        top: 18px;
      }

      .hint {
        bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="counter" id="counter">01 / 05</div>
    <div class="hint">Swipe destra o sinistra</div>
    <model-viewer
      id="viewer"
      src="./assets/models/test.glb"
      alt="Modello 3D Photobooth"
      shadow-intensity="1"
      exposure="1.2"
      disable-zoom>
    </model-viewer>
  </main>
  <script>
    const viewer = document.querySelector('#viewer');
    const counter = document.querySelector('#counter');
    const models = [
      './assets/models/test.glb',
      './assets/models/test2.glb',
      './assets/models/test3.glb',
      './assets/models/test4.glb',
      './assets/models/test5.glb'
    ];

    let currentIndex = 0;
    let startX = null;
    const swipeThreshold = 45;

    function updateViewer() {
      viewer.src = models[currentIndex];
      counter.textContent = `${String(currentIndex + 1).padStart(2, '0')} / ${String(models.length).padStart(2, '0')}`;
    }

    function showNext() {
      currentIndex = (currentIndex + 1) % models.length;
      updateViewer();
    }

    function showPrevious() {
      currentIndex = (currentIndex - 1 + models.length) % models.length;
      updateViewer();
    }

    viewer.addEventListener('pointerdown', (event) => {
      startX = event.clientX;
    });

    viewer.addEventListener('pointerup', (event) => {
      if (startX === null) return;

      const deltaX = event.clientX - startX;
      startX = null;

      if (Math.abs(deltaX) < swipeThreshold) return;

      if (deltaX < 0) {
        showNext();
      } else {
        showPrevious();
      }
    });

    viewer.addEventListener('pointercancel', () => {
      startX = null;
    });

    updateViewer();
  </script>
</body>
</html>
