<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photobooth 3D</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --page-bg: #ffffff;
      --text-color: #111111;
      --muted-text: #666666;
      --button-bg: #f4f4f4;
      --button-border: #dddddd;
      --button-active-bg: #111111;
      --button-active-text: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: var(--page-bg);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text-color);
    }

    main {
      width: min(100%, 1200px);
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      font-weight: 600;
      letter-spacing: 0.02em;
      text-align: center;
    }

    p {
      margin: 0 0 18px;
      text-align: center;
      font-size: 0.95rem;
      color: var(--muted-text);
    }

    .picker {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .picker button {
      border: 1px solid var(--button-border);
      background: var(--button-bg);
      color: var(--text-color);
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    .picker button.is-active {
      background: var(--button-active-bg);
      color: var(--button-active-text);
      border-color: var(--button-active-bg);
    }

    model-viewer {
      width: 100%;
      height: min(78vh, 760px);
      background: #ffffff;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      model-viewer {
        height: 68vh;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Photobooth 3D</h1>
    <p>Scegli una cabina e ruotala liberamente.</p>
    <div class="picker" aria-label="Selezione cabine">
      <button class="is-active" type="button" data-src="./assets/models/test.glb">Classica</button>
      <button type="button" data-src="./assets/models/test2.glb">Mint Photo</button>
      <button type="button" data-src="./assets/models/test3.glb">Retro Photo</button>
    </div>
    <model-viewer
      id="viewer"
      src="./assets/models/test.glb"
      alt="Modello 3D Photobooth"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1.2">
    </model-viewer>
  </main>
  <script>
    const viewer = document.querySelector('#viewer');
    const buttons = document.querySelectorAll('.picker button');

    buttons.forEach((button) => {
      button.addEventListener('click', () => {
        const nextSrc = button.dataset.src;
        if (!nextSrc) return;

        viewer.src = nextSrc;
        buttons.forEach((item) => item.classList.remove('is-active'));
        button.classList.add('is-active');
      });
    });
  </script>
</body>
</html>
